{% extends "base.html" %}
{% block layout %}
<div class="centered-page">
  <div class="error-card">
    <div class="error-code grad-text">{{ code }}</div>
    <h1>{{ heading }}</h1>
    <p>{{ message }}</p>
    <div class="pending-actions">
      <a class="btn btn-brand" href="{{ url_for('main.index') }}"><i class="bi bi-house"></i> Go home</a>
      <a class="btn btn-ghost" href="javascript:history.back()"><i class="bi bi-arrow-left"></i> Go back</a>
    </div>
  </div>
</div>
{% endblock %}
